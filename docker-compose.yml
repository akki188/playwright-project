services:
  app:
    build: .
    ports:
      - "8000:8000"
      - "5173:5173"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=base64:t5qMSKNjlBLDMhVmlKG1cDdjkSXNOGBFvbCOkzDePRY=
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/app/database/database.sqlite
      - SESSION_DRIVER=file
    volumes:
      - sqlite_data:/app/database
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/login"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  sqlite_data:
